name: Morning Agent - Daily Briefing

on:
  schedule:
    # 6:00 UTC = 7:00 AM BST (summer)
    - cron: '0 6 * * *'
    # 7:00 UTC = 7:00 AM GMT (winter)
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  morning-briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check if 7am UK time
        id: timecheck
        run: |
          UK_HOUR=$(TZ='Europe/London' date +%H)
          echo "UK hour is: $UK_HOUR"
          if [ "$UK_HOUR" = "07" ]; then
            echo "run=true" >> $GITHUB_OUTPUT
          else
            echo "run=false" >> $GITHUB_OUTPUT
            echo "Skipping - not 7am UK time"
          fi

      - name: Checkout code
        if: steps.timecheck.outputs.run == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v4

      - name: Set up Python
        if: steps.timecheck.outputs.run == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        if: steps.timecheck.outputs.run == 'true' || github.event_name == 'workflow_dispatch'
        run: pip install -r requirements.txt

      - name: Run Morning Agent
        if: steps.timecheck.outputs.run == 'true' || github.event_name == 'workflow_dispatch'
        env:
          LANGCHAIN_API_KEY: ${{ secrets.LANGCHAIN_API_KEY }}
          LANGCHAIN_TRACING_V2: 'true'
          LANGCHAIN_PROJECT: morning-agent-da75sn
          LANGCHAIN_ENDPOINT: https://api.smith.langchain.com
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          SMARTTHINGS_TOKEN: ${{ secrets.SMARTTHINGS_TOKEN }}
          POSTCODE: DA75SN
          DISPLAY_POSTCODE: 'DA7 5SN'
          LOCATION: 'Bexleyheath, London'
          LAT: '51.461'
          LON: '0.151'
          TRAFFIC_RADIUS_MILES: '2'
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
          ALEXA_NOTIFY_CODE: ${{ secrets.ALEXA_NOTIFY_CODE }}
        run: python main.py